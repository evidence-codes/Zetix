# Root ruff config for all Python in the mono-repo (server/, models/).
# Invoked via `make server-lint` / `make server-fmt` and pre-commit.
line-length = 100
target-version = "py311"
extend-exclude = [".make", "**/build", "**/dist"]

[lint]
select = ["E", "F", "I", "UP", "B", "C4", "SIM"]

[format]
quote-style = "double"
